################################################################################
# Reusable Terraform Job Template
#
# Called by azure-pipelines.yml for each environment stage.
# Performs:
#   1) Download sample app bundle
#   2) Upload bundle to environment S3 bucket
#   3) Terraform init (Azure Blob backend)
#   4) Terraform validate/plan/apply (AWS provider)
################################################################################

parameters:
  - name: environment
    type: string
  - name: awsServiceConnection
    type: string
  - name: awsRegion
    type: string
  - name: appS3Bucket
    type: string
  - name: tfVarsFile
    type: string
  - name: terraformVersion
    type: string
    default: "1.9.0"
  - name: workingDirectory
    type: string

jobs:
  - deployment: Terraform_${{ parameters.environment }}
    displayName: "Terraform - ${{ parameters.environment }}"
    environment: "${{ parameters.environment }}"
    pool:
      vmImage: "ubuntu-latest"
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
              fetchDepth: 1

            - download: current
              artifact: eb-app-bundle

            - task: TerraformInstaller@1
              displayName: "Install Terraform ${{ parameters.terraformVersion }}"
              inputs:
                terraformVersion: "${{ parameters.terraformVersion }}"

            - task: AWSShellScript@1
              displayName: "Upload sample app bundle to S3"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  APP_S3_KEY="releases/sample-app-${BUILD_BUILDID}.zip"
                  aws s3 cp "$(Pipeline.Workspace)/eb-app-bundle/sample-app.zip" "s3://${{ parameters.appS3Bucket }}/${APP_S3_KEY}"
                  echo "##vso[task.setvariable variable=APP_S3_KEY]${APP_S3_KEY}"

            - task: AWSShellScript@1
              displayName: "Terraform init/validate/plan/apply"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  cd "${{ parameters.workingDirectory }}"

                  terraform init -reconfigure \
                    -backend-config="resource_group_name=$(TF_STATE_RESOURCE_GROUP)" \
                    -backend-config="storage_account_name=$(TF_STATE_STORAGE_ACCOUNT)" \
                    -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                    -backend-config="key=ebs/${{ parameters.environment }}/terraform.tfstate" \
                    -backend-config="access_key=$(TF_STATE_ACCESS_KEY)"

                  terraform validate

                  terraform plan \
                    -var-file="${{ parameters.tfVarsFile }}" \
                    -var="app_s3_bucket=${{ parameters.appS3Bucket }}" \
                    -var="app_s3_key=$(APP_S3_KEY)" \
                    -var="app_version_label=$(Build.BuildId)" \
                    -out=tfplan

                  terraform apply -auto-approve tfplan
