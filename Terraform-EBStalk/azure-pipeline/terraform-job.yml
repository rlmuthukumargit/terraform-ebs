################################################################################
# Reusable Terraform Job Template
#
# STATUS: ENABLED
#
# Called by azure-pipeline/azure-pipelines.yml for each environment stage.
# Performs:
#   1) Download app bundle from external artifact source
#   2) Upload bundle to environment S3 bucket
#   3) Terraform init (Azure Blob backend)
#   4) Terraform validate/plan/apply (AWS provider)
################################################################################

parameters:
  - name: environment
    type: string
  - name: awsServiceConnection
    type: string
  - name: awsRegion
    type: string
  - name: appS3Bucket
    type: string
  - name: tfVarsFile
    type: string
  - name: terraformVersion
    type: string
    default: "1.9.0"
  - name: workingDirectory
    type: string
  - name: externalRepoUrl
    type: string

jobs:
  - deployment: Terraform_${{ parameters.environment }}
    displayName: "Terraform - ${{ parameters.environment }}"
    environment: "${{ parameters.environment }}"
    pool:
      vmImage: "ubuntu-latest"
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
              fetchDepth: 1
            
            - checkout: git://${{ parameters.externalRepoUrl }}
              displayName: "Checkout External App Repository"
              persistCredentials: true

            # Generic packaging step - adjust based on actual external repo structure
            - task: AWSShellScript@1
              displayName: "Upload app bundle to S3"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  # Assuming the external repo has a script to package or just a zip
                  # For now, we simulate copying files to S3
                  APP_S3_KEY="releases/app-${BUILD_BUILDID}.zip"
                  
                  # Create a dummy zip if needed or use actual files
                  # zip -r app.zip .
                  
                  # aws s3 cp app.zip "s3://${{ parameters.appS3Bucket }}/${APP_S3_KEY}"
                  echo "Uploading files from external repository to s3://${{ parameters.appS3Bucket }}/${APP_S3_KEY}"
                  # aws s3 sync . "s3://${{ parameters.appS3Bucket }}/src/${BUILD_BUILDID}/"
                  
                  echo "##vso[task.setvariable variable=APP_S3_KEY]${APP_S3_KEY}"

            - task: TerraformInstaller@1
              displayName: "Install Terraform ${{ parameters.terraformVersion }}"
              inputs:
                terraformVersion: "${{ parameters.terraformVersion }}"

            - task: AWSShellScript@1
              displayName: "Terraform Init"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  cd "${{ parameters.workingDirectory }}"
                  terraform init -reconfigure \
                    -backend-config="resource_group_name=$(TF_STATE_RESOURCE_GROUP)" \
                    -backend-config="storage_account_name=$(TF_STATE_STORAGE_ACCOUNT)" \
                    -backend-config="container_name=$(TF_STATE_CONTAINER)" \
                    -backend-config="key=ebs/${{ parameters.environment }}/terraform.tfstate" \
                    -backend-config="access_key=$(TF_STATE_ACCESS_KEY)"

            - task: AWSShellScript@1
              displayName: "Terraform Validate"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  cd "${{ parameters.workingDirectory }}"
                  terraform validate

            - task: AWSShellScript@1
              displayName: "Terraform Plan"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  cd "${{ parameters.workingDirectory }}"
                  terraform plan \
                    -var-file="${{ parameters.tfVarsFile }}" \
                    -var="app_s3_bucket=${{ parameters.appS3Bucket }}" \
                    -var="app_s3_key=$(APP_S3_KEY)" \
                    -var="app_version_label=$(Build.BuildId)" \
                    -out=tfplan

            - task: AWSShellScript@1
              displayName: "Terraform Apply"
              inputs:
                awsCredentials: "${{ parameters.awsServiceConnection }}"
                regionName: "${{ parameters.awsRegion }}"
                scriptType: "inline"
                inlineScript: |
                  set -euo pipefail
                  cd "${{ parameters.workingDirectory }}"
                  terraform apply -auto-approve tfplan
