# Azure DevOps Pipeline for Multi-Environment Elastic Beanstalk Deployment
# This pipeline uses the terraform-job.yml template for consistent deployments.

trigger:
  - main
  - develop
  - release/*

variables:
  - group: aws-credentials 
  - name: terraformVersion
    value: '1.9.0'
  - name: workingDirectory
    value: '.'

stages:
- stage: DeployDev
  displayName: "Deploy to Dev"
  jobs:
  - template: terraform-job.yml
    parameters:
      environment: 'dev'
      awsServiceConnection: 'aws-dev-oidc'
      awsRegion: 'us-east-1'
      appS3Bucket: 'tss-ebs-dev-artifacts-$(AWS_ACCOUNT_ID)'
      tfVarsFile: 'environments/dev.tfvars'
      terraformVersion: '$(terraformVersion)'
      workingDirectory: '$(workingDirectory)'
      externalRepoUrl: 'github.com/your-org/external-app-repo' # REPLACE with actual repo URL

- stage: DeployQA
  displayName: "Deploy to QA"
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - template: terraform-job.yml
    parameters:
      environment: 'qa'
      awsServiceConnection: 'aws-qa-oidc'
      awsRegion: 'us-east-1'
      appS3Bucket: 'tss-ebs-qa-artifacts-$(AWS_ACCOUNT_ID)'
      tfVarsFile: 'environments/qa.tfvars'
      terraformVersion: '$(terraformVersion)'
      workingDirectory: '$(workingDirectory)'
      externalRepoUrl: 'github.com/your-org/external-app-repo' # REPLACE with actual repo URL

- stage: DeployProd
  displayName: "Deploy to Prod"
  dependsOn: DeployQA
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - template: terraform-job.yml
    parameters:
      environment: 'prod'
      awsServiceConnection: 'aws-prod-oidc'
      awsRegion: 'us-east-1'
      appS3Bucket: 'tss-ebs-prod-artifacts-$(AWS_ACCOUNT_ID)'
      tfVarsFile: 'environments/prod.tfvars'
      terraformVersion: '$(terraformVersion)'
      workingDirectory: '$(workingDirectory)'
      externalRepoUrl: 'github.com/your-org/external-app-repo' # REPLACE with actual repo URL
