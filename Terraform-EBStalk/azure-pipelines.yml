# Azure DevOps Pipeline for Spring Boot on Elastic Beanstalk
trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: buildConfiguration
    value: 'Release'
  - group: aws-credentials # Variable group containing AWS access keys or Role names

stages:
- stage: Build
  displayName: Build and Package
  jobs:
  - job: Build
    steps:
    - task: JAVA_TOOL_INSTALLER@0
      inputs:
        version: '21'
        jdkSource: 'PreInstalled'
        jdkArchitecture: 'x64'

    - task: Maven@3
      inputs:
        mavenPomFile: 'app/pom.xml'
        options: '-DskipTests'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        javaHomeOption: 'JDKVersion'
        mavenVersionOption: 'Default'
        mavenAuthenticateFeed: false
        effectivePomSkip: false
        sonarQubeRunAnalysis: false

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(system.defaultworkingdirectory)/app/target'
        Contents: '*.jar'
        TargetFolder: '$(build.artifactstagingdirectory)'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(build.artifactstagingdirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: DeployDev
  displayName: Deploy to Dev
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    # Assuming Terraform is used to provision/update
    # or AWS CLI is used to upload to S3 and update EB
    - task: S3Upload@1
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: 'us-east-1'
        bucketName: 'tss-ebs-dev-artifacts-$(AWS_ACCOUNT_ID)'
        sourceFolder: '$(System.ArtifactsDirectory)/drop'
        globExpressions: '*.jar'
        targetFolder: 'releases'

    - task: BeanstalkDeploy@2
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: 'us-east-1'
        applicationName: 'tss-app'
        environmentName: 'tss-app-dev-env'
        applicationType: 'zip'
        deploymentBundle: '$(System.ArtifactsDirectory)/drop/*.jar'
        versionLabel: '$(Build.BuildId)'
