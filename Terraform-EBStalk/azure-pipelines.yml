################################################################################
# Azure DevOps Multi-Stage Pipeline - Terraform EBS Deployment
#
# Purpose:
# - Build sample application bundle once
# - Upload bundle per environment to S3
# - Deploy reusable Terraform modules to AWS Elastic Beanstalk
# - Keep Terraform state in Azure Blob Storage backend
################################################################################

trigger:
  branches:
    include:
      - main
      - develop
      - release/*

pr:
  branches:
    include:
      - main
      - develop

variables:
  - name: terraformVersion
    value: "1.9.0"
  - name: workingDirectory
    value: "$(System.DefaultWorkingDirectory)/Terraform-EBStalk"
  - name: awsRegion
    value: "us-east-1"

stages:
  - stage: Build
    displayName: "Build Sample App"
    jobs:
      - job: Build_Sample_App
        displayName: "Build Java sample app bundle"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
            fetchDepth: 1

          - script: |
              set -euo pipefail
              cd "$(System.DefaultWorkingDirectory)/Terraform-EBStalk/sample-app"
              mvn -B -DskipTests clean package
            displayName: "Build sample app jar"

          - script: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/bundle"
              cp "$(System.DefaultWorkingDirectory)/Terraform-EBStalk/sample-app/target/"*.jar "$(Build.ArtifactStagingDirectory)/bundle/app.jar"
              cp "$(System.DefaultWorkingDirectory)/Terraform-EBStalk/sample-app/Procfile" "$(Build.ArtifactStagingDirectory)/bundle/Procfile"
              cd "$(Build.ArtifactStagingDirectory)/bundle"
              zip -r sample-app.zip app.jar Procfile
            displayName: "Create Elastic Beanstalk source bundle"

          - task: PublishPipelineArtifact@1
            displayName: "Publish app bundle artifact"
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/bundle/sample-app.zip"
              artifact: "eb-app-bundle"
              publishLocation: "pipeline"

  - stage: Dev
    displayName: "Deploy to Dev"
    dependsOn: Build
    condition: |
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/develop'),
          eq(variables['Build.SourceBranch'], 'refs/heads/main')
        )
      )
    variables:
      - name: environment
        value: "dev"
      - name: awsServiceConnection
        value: "aws-dev-oidc"
      - name: appS3Bucket
        value: "my-app-artifacts-dev"
      - name: tfVarsFile
        value: "environments/dev.tfvars"
    jobs:
      - template: templates/terraform-job.yml
        parameters:
          environment: ${{ variables.environment }}
          awsServiceConnection: $(awsServiceConnection)
          awsRegion: $(awsRegion)
          appS3Bucket: $(appS3Bucket)
          tfVarsFile: $(tfVarsFile)
          terraformVersion: $(terraformVersion)
          workingDirectory: $(workingDirectory)

  - stage: QA
    displayName: "Deploy to QA"
    dependsOn: Dev
    condition: |
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
        )
      )
    variables:
      - name: environment
        value: "qa"
      - name: awsServiceConnection
        value: "aws-qa-oidc"
      - name: appS3Bucket
        value: "my-app-artifacts-qa"
      - name: tfVarsFile
        value: "environments/qa.tfvars"
    jobs:
      - template: templates/terraform-job.yml
        parameters:
          environment: ${{ variables.environment }}
          awsServiceConnection: $(awsServiceConnection)
          awsRegion: $(awsRegion)
          appS3Bucket: $(appS3Bucket)
          tfVarsFile: $(tfVarsFile)
          terraformVersion: $(terraformVersion)
          workingDirectory: $(workingDirectory)

  - stage: Prod
    displayName: "Deploy to Production"
    dependsOn: QA
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    variables:
      - name: environment
        value: "prod"
      - name: awsServiceConnection
        value: "aws-prod-oidc"
      - name: appS3Bucket
        value: "my-app-artifacts-prod"
      - name: tfVarsFile
        value: "environments/prod.tfvars"
    jobs:
      - template: templates/terraform-job.yml
        parameters:
          environment: ${{ variables.environment }}
          awsServiceConnection: $(awsServiceConnection)
          awsRegion: $(awsRegion)
          appS3Bucket: $(appS3Bucket)
          tfVarsFile: $(tfVarsFile)
          terraformVersion: $(terraformVersion)
          workingDirectory: $(workingDirectory)
